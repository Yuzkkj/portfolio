<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuz's Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="imgs/icon.png">
    <link rel="apple-touch-icon" href="imgs/icon.png">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <img src="imgs/icon.png" alt="Profile" class="profile-icon">
                Yuz's<span> Portfolio</span>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#skills">Tech Stack</a></li>
                <li><a href="#games">Games</a></li>
                <li><a href="#systems">Systems</a></li>
            </ul>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <header id="home" class="hero section">
        <div class="hero-content fade-in">
            <div id="availability-status" class="status-badge" style="display: none;"></div>
            <h1 class="title">Full-stack <span>Roblox Developer</span></h1>
            <p class="subtitle" id="experience-subtitle"></p>
            <div class="hero-buttons">
                <a href="#games" class="btn btn-primary">View My Work</a>
                <a href="#contact" class="btn btn-secondary">Hire Me</a>
            </div>
        </div>
    </header>

    <main>
        <section id="skills" class="section">
            <h2 class="section-title fade-in">My <span>Tech Stack</span></h2>
            <div class="skills-container fade-in" id="skills-container">
                <!-- Skills injected by JS -->
            </div>
        </section>

        <section id="games" class="section">
            <h2 class="section-title fade-in">Featured <span>Games</span></h2>
            <div class="games-grid fade-in" id="games-container">
                <!-- Games injected by JS -->
            </div>
        </section>

        <section id="systems" class="section">
            <h2 class="section-title fade-in">Advanced <span>Systems</span></h2>
            <div class="systems-grid fade-in" id="systems-container">
                <!-- Systems injected by JS -->
            </div>
        </section>

        </section>
    </main>

    <footer id="contact" class="footer section fade-in">
        <div class="footer-content">
            <h2>Let's Work <span>Together</span></h2>
            <p>Interested in collaborating or commissioning a system? Reach out!</p>
            <p id="current-time-utc" class="current-time"></p>
            <div class="social-links">
                <a href="https://www.roblox.com/users/3049921175/profile" target="_blank" class="social-icon roblox"
                    title="Roblox Profile">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path
                            d="M5.4,0 L0,18.6 L18.6,24 L24,5.4 L5.4,0 Z M14.4,10.8 L13.2,14.4 L9.6,13.2 L10.8,9.6 L14.4,10.8 Z" />
                    </svg>
                </a>
                <a href="https://discordapp.com/users/901235983054438440" target="_blank" class="social-icon discord"
                    title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="https://github.com/Yuzkkj" target="_blank" class="social-icon github" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
            <p class="copyright">&copy; <span id="year"></span> Yuz. All rights reserved.</p>
        </div>
    </footer>

    <button id="back-to-top" class="back-to-top" title="Back to Top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>

</html>
